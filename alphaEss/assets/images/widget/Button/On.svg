<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <radialGradient id="bg-on" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e3a2f"/>
      <stop offset="100%" stop-color="#0a1a12"/>
    </radialGradient>
    <radialGradient id="sun-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0a500" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f0a500" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sun-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="100%" stop-color="#f0a500"/>
    </radialGradient>
    <filter id="glow-on">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="80" height="80" rx="14" fill="url(#bg-on)"/>
  <rect width="80" height="80" rx="14" fill="none" stroke="#2ecc71" stroke-width="1.5" opacity="0.6"/>

  <!-- Outer glow -->
  <circle cx="40" cy="32" r="22" fill="url(#sun-glow)"/>

  <!-- Sun rays -->
  <g filter="url(#glow-on)" opacity="0.9">
    <!-- 8 rays -->
    <line x1="40" y1="8"  x2="40" y2="14" stroke="#f0a500" stroke-width="2" stroke-linecap="round"/>
    <line x1="40" y1="50" x2="40" y2="56" stroke="#f0a500" stroke-width="2" stroke-linecap="round"/>
    <line x1="16" y1="32" x2="22" y2="32" stroke="#f0a500" stroke-width="2" stroke-linecap="round"/>
    <line x1="58" y1="32" x2="64" y2="32" stroke="#f0a500" stroke-width="2" stroke-linecap="round"/>
    <line x1="22.5" y1="14.5" x2="26.7" y2="18.7" stroke="#f0a500" stroke-width="2" stroke-linecap="round"/>
    <line x1="53.3" y1="45.3" x2="57.5" y2="49.5" stroke="#f0a500" stroke-width="2" stroke-linecap="round"/>
    <line x1="57.5" y1="14.5" x2="53.3" y2="18.7" stroke="#f0a500" stroke-width="2" stroke-linecap="round"/>
    <line x1="26.7" y1="45.3" x2="22.5" y2="49.5" stroke="#f0a500" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Sun core -->
  <circle cx="40" cy="32" r="10" fill="url(#sun-core)" filter="url(#soft-glow)"/>

  <!-- Battery bar at bottom -->
  <rect x="14" y="60" width="52" height="10" rx="5" fill="#0f2a1a" stroke="#2ecc71" stroke-width="1" opacity="0.8"/>
  <rect x="16" y="62" width="38" height="6" rx="3" fill="#2ecc71" opacity="0.9"/>
  <!-- battery tip -->
  <rect x="67" y="63.5" width="3" height="3" rx="1" fill="#2ecc71" opacity="0.7"/>

  <!-- Label -->
  <text x="40" y="76" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#2ecc71" opacity="0.8" letter-spacing="1">SOLAR</text>
</svg>
